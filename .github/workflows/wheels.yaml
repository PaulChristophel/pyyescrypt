name: wheels

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  workflow_dispatch: {}

jobs:
  build_wheels:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Go (runner)
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir dist
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
          CIBW_ENVIRONMENT_LINUX: 'PATH=/usr/local/go/bin:$PATH GO=/usr/local/go/bin/go'
          # Run tests from the project checkout, not the temp test dir
          CIBW_TEST_COMMAND: "python -m pytest -q {project}/tests"
          CIBW_TEST_REQUIRES: "pytest"

          # Linux builds happen in a container. Install Go in the container.
          CIBW_BEFORE_ALL_LINUX: |
            set -euo pipefail
            GO_VER="1.26.2"
            ARCH="$(uname -m)"
            case "$ARCH" in
              x86_64) GO_ARCH="amd64" ;;
              aarch64|arm64) GO_ARCH="arm64" ;;
              *) echo "unsupported arch: $ARCH"; exit 1 ;;
            esac
            curl -fsSL "https://go.dev/dl/go${GO_VER}.linux-${GO_ARCH}.tar.gz" -o /tmp/go.tgz
            rm -rf /usr/local/go
            tar -C /usr/local -xzf /tmp/go.tgz
            /usr/local/go/bin/go version

          # Optional: stop building 32-bit Windows wheels unless you truly want them
          CIBW_ARCHS_WINDOWS: "AMD64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - run: python -m pip install --upgrade pip build
      - run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
